services:
  postgres:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    environment:
      - DEBUG=False
      - DATABASE_ENGINE=postgresql
      - SECRET_KEY
      - ALLOWED_HOSTS
      - POSTGRES_DB
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/staticfiles:ro
      - media:/var/www/media:ro
    depends_on:
      - django

volumes:
  postgres_data:
  staticfiles:
  media:
