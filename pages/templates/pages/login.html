{% extends "base.html" %}
{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}
{% block title %}
Login
{% endblock %}
{% block content %}

<div class="m-auto w-full max-w-sm py-12">

    <div class="bg-base-100 rounded-2xl border border-base-300 p-8 shadow-sm">

        <div class="text-center mb-8">

            <a
                href="{% url 'home' %}"
                class="text-2xl font-bold tracking-tight text-primary"
            >
                MyApp
            </a>

            <h1 class="mt-4 text-3xl font-bold tracking-tight text-base-content">
                Welcome back
            </h1>

            <p class="mt-2 text-sm opacity-60">
                Sign in to your account
            </p>

        </div>

        <div
            id="login-form-container"

            hx-get="{% url 'users:login-form' %}"

            hx-trigger="load"
        >
        </div>

    </div>

</div>

{% endblock %}
