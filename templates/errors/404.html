{% extends 'base.html' %}

{% block title %}Error 404 - Page Not Found{% endblock %}

{% block content %}
<div class="m-auto max-w-md text-center py-12">
    <p class="text-base font-semibold text-primary">404</p>
    <h1 class="mt-2 text-3xl font-bold tracking-tight text-base-content sm:text-4xl">Page not found</h1>
    <p class="mt-4 text-base opacity-70">Sorry, we couldn’t find the page you’re looking for. Please check the URL or return home.</p>
    <div class="mt-10">
        <a href="/" class="inline-flex items-center justify-center rounded-md bg-primary px-4 py-2.5 text-sm font-medium text-white shadow hover:bg-primary/90 transition-colors">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
